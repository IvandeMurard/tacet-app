name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      # Errors-only gate: syntax errors and undefined names. Style rules can
      # be tightened later without blocking this first CI.
      - run: ruff check app tests --select E9,F63,F7,F82

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The unit tests stub osmnx/pandas (never exercised), so only the
      # lightweight core dependencies are needed.
      - run: pip install pytest shapely sqlalchemy pydantic
      - run: python -m pytest tests/ -q
